spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/fir_management}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}

spring.profiles.default=dev
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_DDL_AUTO:none}
spring.jpa.show-sql=false
# Consider using explicit dialect version if needed, e.g. org.hibernate.dialect.MySQL8Dialect
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.MySQLDialect}

spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

app.upload.dir=uploads
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://127.0.0.1:5173}

# JWT configuration (use a long random base64 secret in real deployments)
app.jwt.secret=${APP_JWT_SECRET:VGhpcy1pcy1hLXNpbXBsZS1iYXNlNjQtZW5jb2RlZC1qd3Qtc2VjcmV0LXN1cGVyLWxvbmc=}
app.jwt.expiration-ms=86400000

server.port=${PORT:${SERVER_PORT:8080}}
server.servlet.context-path=/api

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=when_authorized
